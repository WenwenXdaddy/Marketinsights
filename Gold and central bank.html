<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球央行黄金储备与资产负债表宏观演变 (1945-2025)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .tab-active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .tab-inactive { background-color: #f1f5f9; color: #475569; border-color: #cbd5e1; }
        .tab-inactive:hover { background-color: #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">央行底牌：黄金储备占比 vs 资产负债表扩张</h1>
            <p class="text-slate-500 max-w-2xl mx-auto">1945 - 2025：从布雷顿森林体系的“绝对锚”，到信用大放水时代的“终极护盾”</p>
        </header>

        <!-- Main Chart Container -->
        <div class="glass-panel rounded-2xl p-4 md:p-6 w-full relative">
            <!-- Phase Selectors -->
            <div class="flex flex-wrap justify-center gap-2 mb-6" id="phase-buttons">
                <button onclick="highlightPhase(0)" class="tab-active px-4 py-2 rounded-full text-sm font-medium transition-colors duration-200 border" id="btn-0">全局视角 (1945-2025)</button>
                <button onclick="highlightPhase(1)" class="tab-inactive px-4 py-2 rounded-full text-sm font-medium transition-colors duration-200 border" id="btn-1">范式一：黄金绝对锚 (1945-1971)</button>
                <button onclick="highlightPhase(2)" class="tab-inactive px-4 py-2 rounded-full text-sm font-medium transition-colors duration-200 border" id="btn-2">范式二：信用货币崛起 (1971-2008)</button>
                <button onclick="highlightPhase(3)" class="tab-inactive px-4 py-2 rounded-full text-sm font-medium transition-colors duration-200 border" id="btn-3">范式三：量化宽松时代 (2008-2022)</button>
                <button onclick="highlightPhase(4)" class="tab-inactive px-4 py-2 rounded-full text-sm font-medium transition-colors duration-200 border" id="btn-4">范式四：地缘防御体系 (2022-至今)</button>
            </div>

            <!-- ECharts Container -->
            <div id="main-chart" class="w-full h-[500px]"></div>
        </div>

        <!-- Narrative Context Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="narrative-container">
            <!-- Dynamically populated via JS -->
        </div>

    </div>

    <script>
        // Data approximation for narrative representation (Stylized Macro Data)
        const years = ['1945', '1950', '1960', '1971', '1980', '1990', '2000', '2008', '2012', '2018', '2020', '2022', '2025'];
        
        // Gold % of Total Reserves
        const goldPercentUS_EU = [85, 80, 75, 55, 60, 45, 30, 15, 12, 10, 11, 13, 14]; // Stylized developed global avg drop
        const goldPercentEmerging = [0, 0, 0, 1, 2, 2, 3, 4, 6, 8, 9, 12, 16]; // Stylized emerging markets (China, Russia, India)

        // Balance Sheet Sizes (Trillions USD equivalent)
        const bsFed = [0.04, 0.05, 0.06, 0.09, 0.16, 0.3, 0.6, 0.9, 2.9, 4.1, 7.3, 8.9, 7.5];
        const bsPBOC = [0, 0, 0.01, 0.02, 0.05, 0.2, 0.5, 2.5, 4.5, 5.2, 5.5, 5.8, 6.0]; 

        // Narratives
        const narratives = {
            0: {
                title: "世纪大趋势：信用扩张与黄金的U型反转",
                text: "纵观80年，随着法币体系脱离黄金（1971年），央行资产负债表从平稳走向指数级膨胀（尤其是2008年之后）。黄金在外储中的占比先是因法币外汇的暴增而急剧下降，但近年来，面对海量的信用印钞和地缘冲突，新兴市场央行开始加速增持黄金，开启了占比的触底反弹。"
            },
            1: {
                title: "范式一：布雷顿森林体系 (1945-1971)",
                text: "此时美元直接与黄金挂钩（35美元/盎司）。主要国家的央行资产负债表规模极小且平稳，因为印钞受到黄金储备的严格限制。黄金几乎等同于外汇储备本身，欧美国家的黄金储备占比极高。"
            },
            2: {
                title: "范式二：信用脱缰与“去黄金化” (1971-2008)",
                text: "尼克松宣布美元脱离黄金后，全球进入纯信用货币时代。央行资产负债表开始稳步扩张。由于不再需要黄金背书，西方央行大量抛售黄金，转而储备不断生息的美元国债，导致黄金占全球外储比例断崖式下跌。"
            },
            3: {
                title: "范式三：次贷危机与大放水 (2008-2022)",
                text: "2008年金融危机爆发，美联储开启量化宽松（QE），其资产负债表在短短几年内从不到1万亿美元飙升至4万亿以上。面对信用货币的超发风险，全球央行（特别是中俄等新兴市场）从2010年起由净卖家转为净买家，黄金占比停止下跌并开始温和回升。"
            },
            4: {
                title: "范式四：地缘防御与去美元化 (2022-至今)",
                text: "俄乌冲突后，俄罗斯数千亿外汇资产被冻结。这彻底改变了游戏规则：“无对手方风险”的实物黄金成为国家金融安全的终极护盾。尽管欧美资产负债表居高不下，但中国、波兰、新加坡等国开始激进买入黄金，主动进行资产置换，黄金战略地位空前提升。"
            }
        };

        let myChart = echarts.init(document.getElementById('main-chart'));

        const option = {
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'cross' }
            },
            legend: {
                data: ['发达经济体黄金占比(%)', '新兴市场黄金占比(%)', '美联储资产负债表(万亿美元)', '中国央行资产负债表(万亿美元)'],
                bottom: 0,
                textStyle: { color: '#475569' }
            },
            grid: {
                top: '10%',
                left: '5%',
                right: '5%',
                bottom: '12%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: years,
                axisLine: { lineStyle: { color: '#94a3b8' } }
            },
            yAxis: [
                {
                    type: 'value',
                    name: '黄金占外储比例 (%)',
                    position: 'left',
                    max: 100,
                    axisLabel: { formatter: '{value} %' },
                    axisLine: { show: true, lineStyle: { color: '#d97706' } },
                    splitLine: { lineStyle: { type: 'dashed', color: '#e2e8f0' } }
                },
                {
                    type: 'value',
                    name: '资产负债表规模 (万亿美元)',
                    position: 'right',
                    axisLabel: { formatter: '${value} T' },
                    axisLine: { show: true, lineStyle: { color: '#2563eb' } },
                    splitLine: { show: false }
                }
            ],
            series: [
                {
                    name: '美联储资产负债表(万亿美元)',
                    type: 'line',
                    yAxisIndex: 1,
                    areaStyle: { opacity: 0.15 },
                    lineStyle: { width: 3, color: '#2563eb' },
                    itemStyle: { color: '#2563eb' },
                    data: bsFed,
                    smooth: true
                },
                {
                    name: '中国央行资产负债表(万亿美元)',
                    type: 'line',
                    yAxisIndex: 1,
                    areaStyle: { opacity: 0.15 },
                    lineStyle: { width: 3, color: '#dc2626' },
                    itemStyle: { color: '#dc2626' },
                    data: bsPBOC,
                    smooth: true
                },
                {
                    name: '发达经济体黄金占比(%)',
                    type: 'line',
                    yAxisIndex: 0,
                    lineStyle: { width: 3, type: 'dashed', color: '#d97706' },
                    itemStyle: { color: '#d97706' },
                    data: goldPercentUS_EU,
                    smooth: true
                },
                {
                    name: '新兴市场黄金占比(%)',
                    type: 'line',
                    yAxisIndex: 0,
                    lineStyle: { width: 4, color: '#fbbf24' },
                    itemStyle: { color: '#fbbf24' },
                    data: goldPercentEmerging,
                    smooth: true
                }
            ]
        };

        myChart.setOption(option);

        // Resize chart on window resize
        window.addEventListener('resize', () => {
            myChart.resize();
        });

        // Interactive highlighting logic
        function highlightPhase(phaseIndex) {
            // Update button styles
            for(let i=0; i<=4; i++) {
                const btn = document.getElementById(`btn-${i}`);
                if(i === phaseIndex) {
                    btn.classList.remove('tab-inactive');
                    btn.classList.add('tab-active');
                } else {
                    btn.classList.remove('tab-active');
                    btn.classList.add('tab-inactive');
                }
            }

            // Update Narrative Cards
            const container = document.getElementById('narrative-container');
            container.innerHTML = `
                <div class="glass-panel rounded-2xl p-6 col-span-1 md:col-span-2 border-l-4 border-l-blue-500 transition-all duration-300">
                    <h3 class="text-xl font-bold text-slate-800 mb-3">${narratives[phaseIndex].title}</h3>
                    <p class="text-slate-600 leading-relaxed text-lg">${narratives[phaseIndex].text}</p>
                </div>
            `;

            // Define marking areas based on phase
            let markArea = { data: [] };
            if (phaseIndex === 1) {
                markArea.data = [[ { xAxis: '1945' }, { xAxis: '1971' } ]];
            } else if (phaseIndex === 2) {
                markArea.data = [[ { xAxis: '1971' }, { xAxis: '2008' } ]];
            } else if (phaseIndex === 3) {
                markArea.data = [[ { xAxis: '2008' }, { xAxis: '2022' } ]];
            } else if (phaseIndex === 4) {
                markArea.data = [[ { xAxis: '2022' }, { xAxis: '2025' } ]];
            }

            // Update chart options with visual highlights
            myChart.setOption({
                series: [
                    {
                        name: '发达经济体黄金占比(%)',
                        markArea: {
                            itemStyle: { color: 'rgba(59, 130, 246, 0.1)' },
                            data: markArea.data
                        }
                    }
                ]
            });
        }

        // Initialize with default phase (Global View)
        highlightPhase(0);

    </script>
</body>
</html>
