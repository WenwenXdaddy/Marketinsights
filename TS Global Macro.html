      return (

              width: `${Math.abs(data) / maxVal * 100}%`,
              height: "100%",
              background: color,
              borderRadius: 3,
              marginLeft: data < 0 ? "auto" : 0,
              transition: "width 0.6s ease",

          </div>
          <span style={{ width: 50, fontSize: 12, color: color, fontFamily: "'JetBrains Mono', monospace", fontWeight: 600 }}>

              instrument: "EM FX或股指配对交易",
            },
          ],
        },
      ];

      const watchlist = [
        { item: "Hormuz航运/保险市场恢复时间线", why: "决定\"数周 vs 数月\"的核心变量" },

        { item: "美国企业利润率数据", why: "\"保护增长的最后缓冲\"，若侵蚀→衰退风险" },
